services:
  db:
    image: postgres:16-alpine
    container_name: sportuds-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sportuds_pass
      POSTGRES_DB: sportuds
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sportuds"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build: ./backend
    container_name: sportuds-backend
    environment:
      NODE_ENV: development
      PORT: "5000"
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: sportuds
      DB_USER: postgres
      DB_PASSWORD: sportuds_pass
      JWT_SECRET: sportuds_secret_change_me
      JWT_EXPIRES_IN: 30d
      ADMIN_EMAIL: admin@sportuds.uz
      ADMIN_PASSWORD: Admin@123456
      # Mobil QR skanerlash uchun — server IP manzili
      APP_BASE_URL: http://170.168.6.84:5000
      # mqtt-service (qurilma provisioning + OTA) integratsiyasi
      MQTT_SERVICE_URL: http://mqtt-service:8087
      INTERNAL_SERVICE_TOKEN: sportuds_internal_token_change_me
    # Avval migratsiya (jadval/rol), keyin serverni ishga tushiramiz.
    # Migratsiya xatosi (qayta ishga tushirishda) serverni to'xtatmaydi.
    command: sh -c "npm run migrate:ts; npm run dev"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  web-trener:
    build:
      context: ./frontend-trener
      args:
        VITE_API_URL: /api
    container_name: sportuds-web-trener
    ports:
      - "3000:80"
    depends_on:
      - backend

  # MQTT broker — trenajor qurilmalari telemetriyasi + OTA topiclari.
  # DEV: anonim ulanish (mosquitto.conf). Per-device izolyatsiya uchun mosquitto.dynsec.conf.
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: sportuds-mosquitto
    volumes:
      - ./mqtt-service/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
    ports:
      - "1883:1883"

  # mqtt-service (Go) — qurilma ulanishi (device-connect) + OTA. SportUDS db bilan bir bazani ishlatadi.
  mqtt-service:
    build: ./mqtt-service
    container_name: sportuds-mqtt-service
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: sportuds
      DB_USER: postgres
      DB_PASSWORD: sportuds_pass
      DB_SSLMODE: disable
      SERVICE_PORT: "8087"
      OTA_TCP_PORT: "9000"
      MQTT_BROKER: tcp://mosquitto:1883
      # OTA/cmd buyrug'idagi OMMAVIY manzil — qurilma tashqi tarmoqdan (LTE) shu yerga ulanadi.
      OTA_PUBLIC_HOST: "170.168.6.84"
      OTA_PUBLIC_PORT: "9000"
      # backend (Node) ↔ mqtt-service /internal/* uchun shared Bearer token.
      INTERNAL_SERVICE_TOKEN: sportuds_internal_token_change_me
      # Dynamic Security (per-device akkaunt) uchun — bo'sh bo'lsa control API o'chiq (DEV).
      DYNSEC_ADMIN_PASSWORD: ""
    ports:
      - "8087:8087"   # HTTP/WebSocket + /internal/* (provisioning, OTA start)
      - "9000:9000"   # OTA TCP-server (qurilma shu yerga ulanadi)
    depends_on:
      db:
        condition: service_healthy
      mosquitto:
        condition: service_started

volumes:
  pgdata:
  mosquitto_data:
