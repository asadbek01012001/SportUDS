# Mosquitto — SportUDS mqtt-service broker (DEV rejimi).
# Qurilma telemetriyasi (devices/<id>/telemetry) va OTA topiclari shu broker orqali o'tadi.
#
# DEV: anonim ulanishga ruxsat berilgan — pipeline'ni to'liq (telemetriya + OTA) sinash uchun.
# PRODUCTION (per-device izolyatsiya): Dynamic Security'ni yoqing — mosquitto.dynsec.conf
# va README "Dynamic Security" bo'limiga qarang.

listener 1883
allow_anonymous true

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type warning
log_type notice
log_type information
