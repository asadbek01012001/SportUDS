# Mosquitto — SportUDS mqtt-service broker (PRODUCTION / Dynamic Security).
# Per-device MQTT akkauntlar: mqtt-service $CONTROL/dynamic-security/v1 orqali har bir qurilmaga
# alohida username + role + literal ACL yaratadi (devices/<id>/# ga izolyatsiya).
#
# Ishlatishdan oldin dynamic-security.json bootstrap qiling (README'ga qarang):
#   mosquitto_ctrl dynsec init /mosquitto/config/dynamic-security.json dynsec-admin
# So'ng docker-compose'da mqtt-service.conf ni bu faylga almashtiring va DYNSEC_ADMIN_PASSWORD bering.

listener 1883
allow_anonymous false

plugin /usr/lib/mosquitto_dynamic_security.so
plugin_opt_config_file /mosquitto/config/dynamic-security.json

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type warning
log_type notice
log_type information
