apiVersion: v1
kind: Service
metadata:
  name: mqtt-service
  namespace: energolink
spec:
  selector:
    app: mqtt-service
  ports:
    - name: http
      port: 8087
      targetPort: 8087
    - name: ota-tcp # OTA TCP-сервер (KAN-32): ingress-nginx tcp-services 9000 → сюда
      port: 9000
      targetPort: 9000
